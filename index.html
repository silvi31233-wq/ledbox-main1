      badges: ['연구개발/제품개발', '건축/공사', '태양광/배터리 구동', '투명/캐비넷'],
      solutionLink: '',
      boardType: 'industry',
      boardCaption: '특수목적',
      specs: [
        ['IoT', '센서 연동'],
        ['생산 관리', '인디게이터'],
        ['안전 관리', '행동유도형']
      ],
      boardHtml:
        '<div><span>CO₂</span><b class="cyan">800ppm</b></div>' +
        '<div><span>이송</span><b class="green">34m/min</b></div>' +
        '<div><span>생산</span><b class="yellow">2 Stage</b></div>' +
        '<div><span>출입</span><b class="red">금지</b></div>'
    },
    {
      eyebrow: 'Commercial Digital LED DISPLAY',
      titleTop: '홍보 및 안내를 위한',
      titleStrong: '일반형 LED 전광판',
      desc: '소형부터 대형까지 다양한 정보를 출력 합니다.',
      badges: ['고휘도/고해상도', '방수방진/내구성', '텍스트 최적화'],
      solutionLink: 'https://ledbox001.cafe24.com/category/%ED%92%80%EC%B9%BC%EB%9D%BC%EC%9D%BC%EB%B0%98%ED%98%95/53/',
      boardType: 'commercial',
      boardCaption: '상업용',
      specs: [
        ['고휘도', '주간 시인성'],
        ['영상·사진', '고해상도'],
        ['다목적성', '야외·실내']
      ],
      boardHtml: '<div class="lb01-commercial-img"></div>'
    }
  ];

  var currentIndex = 0;
  var autoTimer = null;

  var eyebrow = root.querySelector('#lb01Eyebrow');
  var title = root.querySelector('#lb01Title');
  var desc = root.querySelector('#lb01Desc');
  var badges = root.querySelector('#lb01Badges');
  var copy = root.querySelector('.lb01-copy');
  var preview = root.querySelector('.lb01-preview');
  var menuButtons = root.querySelectorAll('.lb01-menu button');
  var solutionBtn = root.querySelector('#lb01SolutionBtn');
  var boardScreen = root.querySelector('#lb01BoardScreen');
  var boardCaption = root.querySelector('#lb01BoardCaption');

  var spec1 = root.querySelector('#lb01Spec1');
  var spec1Sub = root.querySelector('#lb01Spec1Sub');
  var spec2 = root.querySelector('#lb01Spec2');
  var spec2Sub = root.querySelector('#lb01Spec2Sub');
  var spec3 = root.querySelector('#lb01Spec3');
  var spec3Sub = root.querySelector('#lb01Spec3Sub');

  function renderBadges(items) {
    badges.innerHTML = items.map(function (item) {
      return '<span>' + item + '</span>';
    }).join('');
  }

  function renderSpecs(specs) {
    if (!specs || specs.length !== 3) return;
    spec1.textContent = specs[0][0];
    spec1Sub.textContent = specs[0][1];
    spec2.textContent = specs[1][0];
    spec2Sub.textContent = specs[1][1];
    spec3.textContent = specs[2][0];
    spec3Sub.textContent = specs[2][1];
  }

  function setSlide(index) {
    currentIndex = index;
    var item = slides[index];

    copy.classList.add('is-changing');
    preview.classList.add('is-changing');

    setTimeout(function () {
      eyebrow.textContent = item.eyebrow;
      title.innerHTML = item.titleTop + '<br><strong>' + item.titleStrong + '</strong>';
      desc.textContent = item.desc;
      renderBadges(item.badges);

      boardScreen.className = 'lb01-board-screen ' + item.boardType;
      boardScreen.innerHTML = item.boardHtml;
      boardCaption.textContent = item.boardCaption;
      renderSpecs(item.specs);

      if (solutionBtn) {
        if (item.solutionLink) {
          solutionBtn.href = item.solutionLink;
          solutionBtn.setAttribute('target', '_top');
          solutionBtn.style.display = 'inline-flex';
        } else {
          solutionBtn.href = '#';
          solutionBtn.style.display = 'none';
        }
      }

      menuButtons.forEach(function (btn) {
        btn.classList.toggle('is-active', Number(btn.getAttribute('data-slide')) === index);
      });

      copy.classList.remove('is-changing');
      preview.classList.remove('is-changing');
    }, 160);
  }

  function nextSlide() {
    setSlide((currentIndex + 1) % slides.length);
  }

  function startAuto() {
    stopAuto();
    autoTimer = setInterval(nextSlide, 3000);
  }

  function stopAuto() {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
  }

  menuButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      setSlide(Number(btn.getAttribute('data-slide')));
      startAuto();
    });
  });

  root.addEventListener('mouseenter', stopAuto);
  root.addEventListener('mouseleave', startAuto);

  root.querySelectorAll('a[href="#lb-quote-widget"]').forEach(function (link) {
    link.addEventListener('click', function (e) {
      var target = document.querySelector('#lb-quote-widget');
      if (!target) return;
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  setSlide(0);
  startAuto();
})();
</script>
